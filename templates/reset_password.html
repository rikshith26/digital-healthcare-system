<!DOCTYPE html>
<html class="heal-light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Reset Password - HealAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#2563eb' }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <style>body { background-color: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; }</style>
</head>
<body class="antialiased font-sans">
    <div class="w-full max-w-md px-4">
        <div class="bg-white p-6 sm:p-10 rounded-[2.5rem] shadow-none border border-slate-100 flex flex-col items-center">
            <!-- Branding -->
            <div class="flex items-center gap-2.5 mb-10">
                <i data-lucide="key" class="w-8 h-8 text-slate-900"></i>
                <h1 class="text-2xl font-black tracking-tight text-slate-900 leading-none">New <span class="text-slate-400 font-normal -ml-1">Password</span></h1>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="w-full mb-6 p-4 rounded-2xl text-xs font-bold tracking-tight {% if category == 'error' %}bg-red-50 text-red-500 border border-red-100{% else %}bg-green-50 text-green-600 border border-green-100{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <div class="text-center mb-10">
                <h2 class="text-3xl font-extrabold text-slate-900 mb-2">Create Password</h2>
                <p class="text-slate-500 text-sm">Please enter your new security key</p>
            </div>
            <form method="POST" action="{{ url_for('reset_password') }}" class="w-full space-y-6">
                <input type="hidden" name="email" value="{{ email }}">
                <div class="space-y-1.5 relative">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1" for="password">New Security Key</label>
                    <div class="relative">
                        <input class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all text-slate-900 placeholder-slate-400 font-medium pr-12" id="password" name="password" placeholder="••••••••" type="password" required minlength="6" />
                        <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-primary transition-colors" onclick="togglePassword('password', 'eye-icon-p1')">
                            <i data-lucide="eye" id="eye-icon-p1" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                
                <div class="space-y-1.5 relative">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1" for="confirm_password">Verify Security Key</label>
                    <div class="relative">
                        <input class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all text-slate-900 placeholder-slate-400 font-medium pr-12" id="confirm_password" name="confirm_password" placeholder="••••••••" type="password" required minlength="6" />
                        <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-primary transition-colors" onclick="togglePassword('confirm_password', 'eye-icon-p2')">
                            <i data-lucide="eye" id="eye-icon-p2" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <button class="w-full bg-primary hover:bg-blue-700 text-white font-black py-4.5 py-4 rounded-2xl shadow-xl shadow-primary/20 transition-all hover:scale-[1.02] active:scale-[0.98] mt-8 uppercase tracking-widest text-xs" type="submit">
                    Update Password
                </button>
            </form>
        </div>
    </div>
    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
        lucide.createIcons();
    </script>
</body>
</html>
