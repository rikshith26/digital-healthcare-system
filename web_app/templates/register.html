<!DOCTYPE html>
<html class="heal-light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Join HealAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        'background-heal': '#f8fafc',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
    </style>
</head>
<body class="antialiased font-sans flex items-center justify-center">
    <div class="w-full max-w-md px-4">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-none border border-slate-100 flex flex-col items-center">
            <!-- Branding -->
            <div class="flex items-center gap-2.5 mb-10 text-primary">
                <i data-lucide="waves" class="w-8 h-8"></i>
                <h1 class="text-2xl font-black tracking-tight text-slate-900 leading-none">Heal<span class="text-primary font-black">AI</span></h1>
            </div>

            <div class="text-center mb-10">
                <h2 class="text-3xl font-extrabold text-slate-900 mb-2 tracking-tight">Create Identity</h2>
                <p class="text-slate-500 text-sm">Join the future of healthcare today</p>
            </div>

            <!-- Flask Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="w-full mb-6 p-4 rounded-2xl text-xs font-bold tracking-tight {% if category == 'error' %}bg-red-50 text-red-500 border border-red-100{% else %}bg-green-50 text-green-600 border border-green-100{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" class="w-full space-y-4">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1" for="username">Full Name</label>
                    <input class="w-full px-6 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all text-slate-900 placeholder-slate-400 font-medium" 
                           id="username" name="username" placeholder="John Doe" type="text" required/>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1" for="email">Email Address</label>
                    <input class="w-full px-6 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all text-slate-900 placeholder-slate-400 font-medium" 
                           id="email" name="email" placeholder="name@hospital.com" type="email" required/>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1" for="password">Security Key</label>
                    <input class="w-full px-6 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all text-slate-900 placeholder-slate-400 font-medium" 
                           id="password" name="password" placeholder="••••••••" type="password" required/>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1" for="role">Account Type</label>
                    <select class="w-full px-6 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all text-slate-900 appearance-none cursor-pointer font-medium" id="role" name="role" required>
                        <option value="patient">Patient</option>
                        <option value="doctor">Doctor</option>
                        <option value="technician">Technician</option>
                    </select>
                </div>

                <button class="w-full bg-primary hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-primary/20 transition-all hover:scale-[1.02] active:scale-[0.98] mt-6 uppercase tracking-widest text-xs" type="submit">
                    Join Network
                </button>
            </form>

            <p class="mt-8 text-center text-xs font-bold text-slate-400">
                Already registered? 
                <a class="text-primary hover:text-blue-700 transition-colors" href="{{ url_for('login') }}">Member Login</a>
            </p>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
